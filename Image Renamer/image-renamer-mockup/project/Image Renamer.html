<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Image Renamer</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles/app.css"/>
<style>
  html, body, #root { height: 100%; width: 100%; }
  body { background: oklch(0.93 0.006 270); }
  .stage {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    padding: 28px;
    background: radial-gradient(140% 90% at 50% 0%, oklch(0.96 0.01 265) 0%, oklch(0.91 0.01 265) 70%);
  }
  .window-wrap {
    width: min(1280px, 100%);
    height: min(820px, 100%);
    position: relative;
  }
  .mac-window {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
    background: oklch(1 0 0);
    box-shadow: 0 0 0 0.5px oklch(0 0 0 / 0.2), 0 30px 80px -20px oklch(0 0 0 / 0.35), 0 12px 36px -12px oklch(0 0 0 / 0.25);
    position: relative;
  }
  .mac-window__chrome {
    height: 38px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 14px;
    background: linear-gradient(to bottom, oklch(0.985 0.003 85), oklch(0.96 0.004 85));
    border-bottom: 1px solid oklch(0.88 0.005 85);
    flex-shrink: 0;
  }
  [data-theme="dark"] .mac-window__chrome {
    background: linear-gradient(to bottom, oklch(0.28 0.013 265), oklch(0.22 0.013 265));
    border-bottom-color: oklch(0.32 0.013 265);
  }
  .mac-window__lights { display: flex; gap: 8px; align-items: center; }
  .tl {
    width: 12px; height: 12px; border-radius: 50%;
    border: 0.5px solid oklch(0 0 0 / 0.15);
  }
  .tl--close { background: #ff5f57; }
  .tl--min   { background: #febc2e; }
  .tl--max   { background: #28c840; }
  .mac-window__title {
    font: 500 12.5px/1 -apple-system, "SF Pro Text", sans-serif;
    color: oklch(0.3 0.01 270);
    letter-spacing: -0.01em;
  }
  [data-theme="dark"] .mac-window__title { color: oklch(0.9 0.008 270); }
  .mac-window__body { flex: 1; min-height: 0; display: flex; position: relative; }
  .mac-window__body > .app,
  .mac-window__body > .stage-app { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/image-renamer-app.jsx"></script>

<script type="text/babel">
function WindowChrome({ title, children }) {
  return (
    <div className="mac-window">
      <div className="mac-window__chrome">
        <div className="mac-window__lights">
          <span className="tl tl--close"/>
          <span className="tl tl--min"/>
          <span className="tl tl--max"/>
        </div>
        <div className="mac-window__title">{title}</div>
        <div className="mac-window__spacer"/>
      </div>
      <div className="mac-window__body">{children}</div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "violet",
  "accentHue": 265,
  "density": "comfy",
  "theme": "light",
  "layout": "split"
}/*EDITMODE-END*/;

function Root() {
  const [tweaks, setTweaks] = React.useState(() => {
    try {
      const saved = localStorage.getItem("imageRenamer.tweaks");
      return saved ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) } : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksOn, setTweaksOn]   = React.useState(false);
  const [panelOpen, setPanelOpen] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--hue", tweaks.accentHue);
    document.documentElement.dataset.theme = tweaks.theme;
    try { localStorage.setItem("imageRenamer.tweaks", JSON.stringify(tweaks)); } catch {}
  }, [tweaks]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "__activate_edit_mode")   { setTweaksOn(true);  setPanelOpen(true); }
      if (d.type === "__deactivate_edit_mode") { setTweaksOn(false); setPanelOpen(false); }
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const handleTweaksChange = (next) => {
    setTweaks(next);
    try {
      window.parent.postMessage({
        type: "__edit_mode_set_keys",
        edits: {
          accent: next.accent,
          accentHue: next.accentHue,
          density: next.density,
          theme: next.theme,
          layout: next.layout,
        }
      }, "*");
    } catch {}
  };

  return (
    <div className="stage">
      <div className="window-wrap">
        <WindowChrome title="Image Renamer">
          <ImageRenamerApp tweaks={tweaks} onTweaksChange={handleTweaksChange}/>
          {tweaksOn && !panelOpen && (
            <button className="tweaks-btn" onClick={() => setPanelOpen(true)} title="Tweaks">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
            </button>
          )}
          {tweaksOn && panelOpen && (
            <TweaksPanel tweaks={tweaks} onTweaksChange={handleTweaksChange} onClose={() => setPanelOpen(false)}/>
          )}
        </WindowChrome>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
